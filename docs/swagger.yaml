basePath: /api/v1
definitions:
  apperror.AppError:
    properties:
      detail:
        type: string
      message:
        type: string
    type: object
  domain.GrammarExample:
    properties:
      japanese:
        type: string
      reading:
        type: string
      translation:
        type: string
    type: object
  dto.ActivityLogResponse:
    properties:
      action:
        type: string
      date:
        type: string
      detail:
        type: string
    type: object
  dto.AddWordToDeckRequest:
    properties:
      word_id:
        type: string
    required:
    - word_id
    type: object
  dto.CreateGrammarRequest:
    properties:
      examples:
        items:
          $ref: '#/definitions/dto.GrammarExampleDTO'
        type: array
      formation:
        minLength: 1
        type: string
      jlpt:
        maximum: 5
        minimum: 1
        type: integer
      meaning:
        minLength: 1
        type: string
      notes:
        type: string
      pattern:
        minLength: 1
        type: string
    required:
    - formation
    - jlpt
    - meaning
    - pattern
    type: object
  dto.CreateParagraphRequest:
    properties:
      content:
        minLength: 10
        type: string
      jlpt:
        maximum: 5
        minimum: 1
        type: integer
      questions:
        items:
          $ref: '#/definitions/dto.ParagraphQuestionDTO'
        minItems: 1
        type: array
      tags:
        items:
          type: string
        type: array
      title:
        minLength: 1
        type: string
    required:
    - content
    - jlpt
    - questions
    - tags
    - title
    type: object
  dto.CreateQuestionRequest:
    properties:
      choices:
        items:
          type: string
        maxItems: 6
        minItems: 2
        type: array
      correct_index:
        minimum: 0
        type: integer
      explanation:
        type: string
      jlpt:
        maximum: 5
        minimum: 1
        type: integer
      prompt:
        minLength: 1
        type: string
      section:
        enum:
        - vocabulary
        - grammar
        - reading
        type: string
      tags:
        items:
          type: string
        type: array
      type:
        enum:
        - multiple_choice
        - fill_in_blank
        - reorder
        type: string
    required:
    - choices
    - jlpt
    - prompt
    - section
    - tags
    - type
    type: object
  dto.CreateWordRequest:
    properties:
      jlpt:
        maximum: 5
        minimum: 1
        type: integer
      kanji:
        items:
          $ref: '#/definitions/dto.KanjiDTO'
        minItems: 1
        type: array
      readings:
        items:
          $ref: '#/definitions/dto.ReadingDTO'
        minItems: 1
        type: array
      senses:
        items:
          $ref: '#/definitions/dto.SenseDTO'
        minItems: 1
        type: array
    required:
    - kanji
    - readings
    - senses
    type: object
  dto.GlossDTO:
    properties:
      lang:
        type: string
      text:
        type: string
    required:
    - lang
    - text
    type: object
  dto.GlossResponse:
    properties:
      lang:
        type: string
      text:
        type: string
    type: object
  dto.GrammarExampleDTO:
    properties:
      japanese:
        type: string
      reading:
        type: string
      translation:
        type: string
    required:
    - japanese
    - reading
    - translation
    type: object
  dto.GrammarResponse:
    properties:
      example:
        items:
          $ref: '#/definitions/domain.GrammarExample'
        type: array
      formation:
        type: string
      id:
        type: string
      jlpt:
        type: integer
      meaning:
        type: string
      notes:
        type: string
      pattern:
        type: string
    type: object
  dto.KanjiDTO:
    properties:
      info:
        type: string
      text:
        type: string
    required:
    - text
    type: object
  dto.KanjiResponse:
    properties:
      info:
        type: string
      text:
        type: string
    type: object
  dto.ParagraphQuestionDTO:
    properties:
      choices:
        items:
          type: string
        maxItems: 6
        minItems: 2
        type: array
      correct_index:
        minimum: 0
        type: integer
      explanation:
        type: string
      jlpt:
        maximum: 5
        minimum: 1
        type: integer
      prompt:
        minLength: 1
        type: string
      type:
        enum:
        - multiple_choice
        - fill_in_blank
        type: string
    required:
    - choices
    - jlpt
    - prompt
    - type
    type: object
  dto.ParagraphResponse:
    properties:
      content:
        type: string
      id:
        type: string
      jlpt:
        type: integer
      questions:
        items:
          $ref: '#/definitions/dto.QuestionResponse'
        type: array
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  dto.ProgressResponse:
    properties:
      accuracy:
        type: number
      cards_studied:
        type: integer
      jlpt_level:
        type: integer
      last_study_at:
        type: string
      longest_streak:
        type: integer
      quizzes_taken:
        type: integer
      recent_activity:
        items:
          $ref: '#/definitions/dto.ActivityLogResponse'
        type: array
      streak:
        type: integer
      weekly_minutes:
        items:
          type: integer
        type: array
    type: object
  dto.QuestionResponse:
    properties:
      choices:
        items:
          type: string
        type: array
      id:
        type: string
      prompt:
        type: string
      type:
        type: string
    type: object
  dto.QuestionWithAnswerResponse:
    properties:
      choices:
        items:
          type: string
        type: array
      correct_index:
        type: integer
      explanation:
        type: string
      id:
        type: string
      prompt:
        type: string
      type:
        type: string
    type: object
  dto.ReadingDTO:
    properties:
      text:
        type: string
    required:
    - text
    type: object
  dto.ReadingResponse:
    properties:
      info:
        items:
          type: string
        type: array
      text:
        type: string
    type: object
  dto.ReviewCardRequest:
    properties:
      quality:
        maximum: 5
        minimum: 0
        type: integer
    required:
    - quality
    type: object
  dto.SRSCardResponse:
    properties:
      due_date:
        type: string
      ease_factor:
        type: number
      id:
        type: string
      interval:
        type: integer
      repetition:
        type: integer
      word_id:
        type: string
    type: object
  dto.SenseDTO:
    properties:
      gloss:
        items:
          $ref: '#/definitions/dto.GlossDTO'
        minItems: 1
        type: array
      pos:
        items:
          type: string
        type: array
    required:
    - gloss
    type: object
  dto.SenseResponse:
    properties:
      gloss:
        items:
          $ref: '#/definitions/dto.GlossResponse'
        type: array
      pos:
        items:
          type: string
        type: array
    type: object
  dto.SubmitTestRequest:
    properties:
      answers:
        additionalProperties:
          type: integer
        type: object
    required:
    - answers
    type: object
  dto.SubmitTestResponse:
    properties:
      score:
        type: integer
      total:
        type: integer
    type: object
  dto.SwaggerPaginatedGrammars:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.GrammarResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.SwaggerPaginatedParagraphs:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.ParagraphResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.SwaggerPaginatedQuestions:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.QuestionWithAnswerResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.SwaggerPaginatedWords:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.WordResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  dto.TestPartResponse:
    properties:
      questions:
        items:
          $ref: '#/definitions/dto.QuestionResponse'
        type: array
      section:
        type: string
    type: object
  dto.TestResponse:
    properties:
      id:
        type: string
      jlpt:
        type: integer
      sections:
        items:
          $ref: '#/definitions/dto.TestPartResponse'
        type: array
      time_limit:
        type: integer
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      picture_url:
        type: string
      study_progress:
        $ref: '#/definitions/dto.ProgressResponse'
    type: object
  dto.WordResponse:
    properties:
      id:
        type: string
      is_common:
        type: boolean
      jlpt:
        type: integer
      kanji:
        items:
          $ref: '#/definitions/dto.KanjiResponse'
        type: array
      readings:
        items:
          $ref: '#/definitions/dto.ReadingResponse'
        type: array
      sense:
        items:
          $ref: '#/definitions/dto.SenseResponse'
        type: array
    type: object
host: learning-japanese.onrender.com
info:
  contact: {}
  description: A Japanese learning application API
  title: Learning Japanese API
